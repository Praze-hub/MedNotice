version: "3.9"

services:
  db:
    image: postgres:14-alpine
    container_name: mednotice_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
    - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
      # start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: mednotice_redis
    restart: unless-stopped
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      # start_period: 30s

  api:
    build:
      context: .
      dockerfile: docker/dev/DockerFile
    container_name: mednotice_api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./app:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
       db:
          condition: service_healthy
       redis:
          condition: service_started
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: docker/dev/DockerFile
    container_name: mednotice_celery
    command: python -m celery -A core worker -l info
    volumes:
      - ./app:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  flower:
    image: mher/flower
    container_name: mednotice_flower
    command: celery --broker=${REDIS_URL} flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

